name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy --strict src/subschema

      - name: Run architecture audits
        run: >
          uv run python scripts/semantic_boundary_inventory.py
          --summary
          --fail-on runtime-proof-raw-read
          --fail-on runtime-proof-extractor-call
          --fail-on shape-compat
          --fail-on prover-compiler-import
          --fail-on ir-runtime-import
          --fail-on validator-runtime-import
          --fail-on compiler-prover-import
          --fail-on compiler-validator-import
          --fail-on raw-child-schema-field
          --fail-on raw-subproof-api
          --fail-on scheduler-reason-control

      - name: Run tests
        env:
          HYPOTHESIS_PROFILE: subschema-ci
        run: uv run pytest -q

      - name: Check whitespace in diff
        run: git diff --check

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Verify distributions
        run: uv run python scripts/release_smoke.py

  performance-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Run performance smoke
        run: uv run python scripts/performance_smoke.py
